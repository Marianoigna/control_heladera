services:

  # ── Servidor web (Django + Daphne) ────────────────────────────────────────
  - type: web
    name: control-heladera-web
    runtime: python
    buildCommand: pip install -r requirements.txt && cd CONTROL_HELADERAS && python manage.py collectstatic --noinput
    startCommand: >-
      cd CONTROL_HELADERAS &&
      python manage.py migrate --noinput &&
      daphne -b 0.0.0.0 -p $PORT ERROR_PROOFING.asgi:application
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ERROR_PROOFING.settings
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Worker MQTT (puente broker → API REST) ────────────────────────────────
  - type: worker
    name: control-heladera-mqtt
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python CONTROL_HELADERAS/mqtt_subscriber.py
    envVars:
      - key: API_BASE_URL
        sync: false   # completar manualmente con la URL del web service de Render
      - key: PYTHON_VERSION
        value: "3.12.0"
