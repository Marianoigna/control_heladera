services:

  # ── Servidor web (Django + Daphne) ────────────────────────────────────────
  - type: web
    name: control-heladera-web
    runtime: python
    buildCommand: bash build_render.sh
    startCommand: bash start_web.sh
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: ERROR_PROOFING.settings
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Worker MQTT (puente broker → API REST) ────────────────────────────────
  - type: worker
    name: control-heladera-mqtt
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python CONTROL_HELADERAS/mqtt_subscriber.py
    envVars:
      - key: API_BASE_URL
        sync: false   # completar manualmente con la URL del web service de Render
      - key: PYTHON_VERSION
        value: "3.12.0"
